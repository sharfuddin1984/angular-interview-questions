<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Angular Interview Prep — 100 Q&amp;A</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--sur:#111318;--sur2:#181c24;--bdr:#1e2330;--acc:#dd3333;--cyn:#00d4ff;--ylw:#ffd60a;--txt:#e8ecf4;--mut:#6b7390}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family: "Segoe UI", system-ui, sans-serif;min-height:100vh;overflow-x:hidden}
header{background:linear-gradient(135deg,#0d1117,#111827,#0d1117);border-bottom:1px solid var(--bdr);padding:18px 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.badge {font-size: .62rem !important;letter-spacing: .25em;color: #60a5fa;text-transform: uppercase; margin-bottom:.3rem;background: transparent !important;}
.hi{max-width:1100px;margin:0 auto;text-align:center;display:flex;flex-direction:column;align-items:center}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:4px}
.li{width:36px;height:36px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.logo h1{font-size:2rem;font-weight:800}.logo h1 span{color:var(--acc)}
.badge{background:var(--acc);color:#fff;font-size:.6rem;padding:2px 7px;border-radius:20px;font-weight:700;margin-left:6px;vertical-align:middle}
.sub{font-size: .75rem;margin:.3rem 0 .8rem;letter-spacing:.3px}
@media screen and (max-width: 768px){
  .logo h1{font-size: 1.5rem;}
  .sub{
    margin:0 0 .6rem;
  }
}
.sw{position:relative;max-width:500px;width:100%;margin:0 auto}
.sw input{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:9px 12px 9px 34px;color:var(--txt);font-family:Syne,sans-serif;font-size:.85rem;outline:none}
.sw input:focus{border-color:var(--acc)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--mut);pointer-events:none}
.fr{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px;width:100%}
.cb{background:#1a1f2e;border:1px solid var(--bdr);color:var(--mut);padding:4px 11px;border-radius:20px;font-size:.7rem;font-weight:600;cursor:pointer;font-family:Syne,sans-serif;transition:all .15s}
.cb:hover,.cb.on{background:var(--acc);border-color:var(--acc);color:#fff}
@media screen and (max-width: 768px){
  .fr{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
  .fr::-webkit-scrollbar{display:none}
  .cb{flex-shrink:0;white-space:nowrap}
}
.st{font-size:.7rem;color:var(--mut);margin-top:8px}.st span{color:var(--cyn);font-weight:700}
main{max-width:1100px;margin:0 auto;padding:18px}
.tb{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tbtn{background:var(--sur2);border:1px solid var(--bdr);color:var(--mut);padding:6px 13px;border-radius:6px;font-size:.73rem;font-weight:600;cursor:pointer;font-family:Syne,sans-serif;transition:all .15s}
.tbtn:hover{border-color:var(--cyn);color:var(--cyn)}.tbtn.bmon{border-color:var(--ylw);color:var(--ylw)}
.grid{display:grid;grid-template-columns:1fr;gap:14px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;transition:border-color .2s,transform .15s}
.card:hover{border-color:#2a3048;transform:translateY(-1px)}.card.open{border-color:var(--acc)}
.ch{padding:13px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.qn{background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;min-width:30px;height:26px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:var(--mut);flex-shrink:0;font-family:"JetBrains Mono",monospace}
.card.open .qn{background:var(--acc);color:#fff;border-color:var(--acc)}
.qt{font-size:.86rem;font-weight:600;line-height:1.4;flex:1}
.bm{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--mut);font-size:15px;padding:0 0 0 8px;flex-shrink:0;line-height:1}.bm.on{color:var(--ylw)}
.ct{padding:0 14px 10px;display:flex;gap:5px;flex-wrap:wrap}
.tg{font-size:.63rem;padding:2px 7px;border-radius:12px;font-weight:600}
.ta{background:#1a0f2e;color:#a78bfa;border:1px solid #2d1f52}
.tt{background:#0f1a2e;color:#60a5fa;border:1px solid #1e3052}
.tj{background:#1a1500;color:#fbbf24;border:1px solid #2d2200}
.tr{background:#1a0a0a;color:#f87171;border:1px solid #3d1515}
.tc{background:#001a12;color:#34d399;border:1px solid #003d25}
.tf{background:#1a0a18;color:#f0abfc;border:1px solid #3d1540}
.to{background:#0a1a1a;color:#67e8f9;border:1px solid #154040}
.tp{background:#1a0f00;color:#fb923c;border:1px solid #3d2500}
.tm{background:#141414;color:#94a3b8;border:1px solid #2a2a2a}
.ans{display:none;border-top:1px solid var(--bdr);padding:14px}
.card.open .ans{display:block}
.ans p{font-size:.8rem;line-height:1.65;color:#c5cade;margin-bottom:8px}
.ans h4{font-size:.72rem;font-weight:700;color:var(--cyn);margin:10px 0 5px;letter-spacing:.5px;text-transform:uppercase}
pre{background:#0d1117;border:1px solid #1e2330;border-radius:8px;padding:12px;overflow-x:auto;margin-bottom:8px;position:relative}
pre code{font-family:"JetBrains Mono",monospace;font-size:.7rem;line-height:1.6;color:#e2e8f0;white-space:pre}
.cpb{position:absolute;top:7px;right:7px;background:var(--sur2);border:1px solid var(--bdr);color:var(--mut);border-radius:5px;padding:2px 8px;font-size:.63rem;cursor:pointer;font-family:Syne,sans-serif;font-weight:600;transition:all .15s}
.cpb:hover{background:var(--acc);color:#fff}
.empty{text-align:center;padding:60px 20px;color:var(--mut)}
#btt{position:fixed;bottom:20px;right:20px;background:var(--acc);color:#fff;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;display:none;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 20px rgba(221,51,51,.4)}
#btt.show{display:flex}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<div class="hi">
<div class="badge" bis_skin_checked="1">Frontend Interview Prep — Mohd Sharfuddin Khan</div>
<div class="logo"><div class="li">A</div><h1>Angular <span>Interview</span> Prep</h1></div>
<div class="sub" bis_skin_checked="1">100 questions · click any card to expand</div>
<div class="sw"><span class="si">&#128269;</span><input type="text" id="sin" placeholder="Search questions, topics, keywords&#8230;" oninput="fc()"></div>
<div class="fr" id="cf"></div>
<div class="st">Showing <span id="cd">100</span> of 100 &nbsp;&bull;&nbsp; <span id="bc">0</span> bookmarked</div>
</div>
</header>
<main>
<div class="tb">
<button class="tbtn" onclick="ea()">Expand All</button>
<button class="tbtn" onclick="ca()">Collapse All</button>
<button class="tbtn" id="bmt" onclick="tb2()">&#11088; Bookmarks Only</button>
</div>
<div class="grid" id="grid"></div>
<div class="empty" id="emp" style="display:none">No questions match your search.</div>
</main>
<button id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>
<script type="application/json" id="qdata">
[{"id": 1, "q": "Difference between Type and Interface in TypeScript", "cat": "TypeScript", "tags": ["tt"], "a": "<p><b>Interface</b> defines object shape, supports declaration merging &amp; class implementation. <b>Type</b> aliases any type including unions, intersections, tuples. Use Interface for objects; Type for complex combinations.</p>", "code": "interface User { name: string; age: number; }\ninterface User { email: string; } // merges!\ninterface Admin extends User { role: string; }\n\ntype ID = string | number;\ntype Admin2 = User &amp; { role: string };\ntype Status = 'active' | 'inactive';"}, {"id": 2, "q": "Difference between Computed Signal and Effect", "cat": "Signals", "tags": ["ta"], "a": "<p><b>computed()</b> derives a read-only cached value from signals — re-evaluated lazily when dependencies change. <b>effect()</b> runs side-effects whenever signal dependencies change. Never update signals inside effect().</p>", "code": "const count = signal(0);\nconst doubled = computed(() => count() * 2); // lazy cached\n\neffect(() => {\n  console.log(`Count: ${count()}`); // runs on every change\n});\ncount.set(5);\nconsole.log(doubled()); // 10"}, {"id": 3, "q": "What is NgRx and how do you implement it?", "cat": "NgRx", "tags": ["ta"], "a": "<p>NgRx is Redux-inspired state management for Angular. Flow: <b>Component &rarr; Action &rarr; Reducer &rarr; Store &rarr; Selector &rarr; Component</b>. Effects handle async operations like HTTP calls.</p>", "code": "// actions.ts\nexport const loadUsers = createAction('[User] Load');\nexport const loadOk = createAction('[User] Success', props<{users:User[]}>());\n\n// reducer.ts\nexport const reducer = createReducer(init,\n  on(loadOk, (s, {users}) => ({...s, users}))\n);\n\n// effect.ts\nload$ = createEffect(() => actions$.pipe(\n  ofType(loadUsers),\n  switchMap(() => svc.getAll().pipe(map(users => loadOk({users}))))\n));\n\n// component:\n// this.store.dispatch(loadUsers())\n// users$ = this.store.select(selectUsers)"}, {"id": 4, "q": "What are HTTP Interceptors in Angular?", "cat": "HTTP", "tags": ["ta"], "a": "<p>Interceptors are global HTTP middleware — intercept requests/responses for auth tokens, error handling, logging, and loading spinners. Angular 15+ prefers functional interceptors.</p>", "code": "export const authInterceptor: HttpInterceptorFn = (req, next) => {\n  const token = inject(AuthService).getToken();\n  return next(req.clone({\n    setHeaders: { Authorization: `Bearer ${token}` }\n  })).pipe(\n    catchError(err => {\n      if (err.status === 401) inject(Router).navigate(['/login']);\n      return throwError(() => err);\n    })\n  );\n};\n// Register: provideHttpClient(withInterceptors([authInterceptor]))"}, {"id": 5, "q": "What are Signals in Angular 16+?", "cat": "Signals", "tags": ["ta"], "a": "<p>Signals are reactive primitives holding a value that notifies consumers when it changes. They enable fine-grained change detection without Zone.js overhead.</p>", "code": "import { signal, computed, effect } from '@angular/core';\n\nexport class CounterComponent {\n  count = signal(0);\n  doubled = computed(() => this.count() * 2);\n\n  constructor() {\n    effect(() => console.log(`count: ${this.count()}`));\n  }\n  inc()   { this.count.update(v => v + 1); }\n  reset() { this.count.set(0); }\n}\n// Template: {{ count() }} — {{ doubled() }}"}, {"id": 6, "q": "How does Change Detection work in Angular?", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>Angular checks the component tree for data changes and updates the DOM. <b>Default</b>: checks all components on every browser event. <b>OnPush</b>: skips a component unless its @Input references change, an event fires from it, or markForCheck() is called.</p>", "code": "// Default — checks all on every async event\n@Component({ changeDetection: ChangeDetectionStrategy.Default })\n\n// OnPush — skips unless triggered\n@Component({ changeDetection: ChangeDetectionStrategy.OnPush })\nexport class UserCard {\n  @Input() user: User; // must pass NEW reference\n  cd = inject(ChangeDetectorRef);\n  refresh() { this.cd.markForCheck(); }\n}"}, {"id": 7, "q": "Difference between Default and OnPush Change Detection", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p><b>Default</b>: checks entire tree on every browser async event — simple but costly in large apps. <b>OnPush</b>: skips subtree unless triggered. Requires immutable patterns — pass new object references for @Input(). Signals work perfectly with OnPush.</p>", "code": "// ❌ Won't trigger OnPush — mutates existing object\nthis.user.name = 'Updated';\n\n// ✅ Triggers OnPush — new object reference\nthis.user = { ...this.user, name: 'Updated' };\n\n@Component({ changeDetection: ChangeDetectionStrategy.OnPush })\nexport class Card {\n  // Signals always trigger correctly\n  user = signal<User | null>(null);\n  update(n: string) {\n    this.user.update(u => u ? {...u, name: n} : u);\n  }\n}"}, {"id": 8, "q": "What are Lifecycle Hooks in Angular?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Lifecycle hooks let you tap into key moments. Order: constructor &rarr; ngOnChanges &rarr; ngOnInit &rarr; ngDoCheck &rarr; ngAfterContentInit &rarr; ngAfterViewInit &rarr; ngOnDestroy. Most used: ngOnInit (setup), ngOnChanges (input change), ngOnDestroy (cleanup).</p>", "code": "@Component({...})\nexport class Demo implements OnInit, OnChanges, AfterViewInit, OnDestroy {\n  @Input() title: string;\n  private sub: Subscription;\n\n  ngOnChanges(c: SimpleChanges) { /* @Input changed */ }\n  ngOnInit()        { /* init — @Input ready */ }\n  ngAfterViewInit() { /* ViewChild available */ }\n  ngOnDestroy()     { this.sub?.unsubscribe(); }\n}"}, {"id": 9, "q": "Multiple Router Outlets in Angular", "cat": "Routing", "tags": ["ta", "to"], "a": "<p>Angular supports named (auxiliary) router outlets loading different components simultaneously — useful for sidebars, modals, and panels alongside main content.</p>", "code": "<!-- Template -->\n<router-outlet></router-outlet>              <!-- primary -->\n<router-outlet name=\"sidebar\"></router-outlet> <!-- named -->\n\n// Route config\n{ path: 'help', component: HelpComponent, outlet: 'sidebar' }\n\n// Navigate\nrouter.navigate([{ outlets: { sidebar: ['help'] } }]);\n// Clear\nrouter.navigate([{ outlets: { sidebar: null } }]);"}, {"id": 10, "q": "Difference between canMatch and canLoad", "cat": "Routing", "tags": ["ta", "to"], "a": "<p><b>canLoad</b> (deprecated v15+): prevents lazy module download. <b>canMatch</b> (v14.1+): prevents route from matching, allowing fallback to the next matching route. canMatch is more flexible.</p>", "code": "// canMatch — prevents matching, tries next route\n{ path: 'admin', loadChildren: () => import('./admin.routes'), canMatch: [authGuard] },\n{ path: 'admin', component: LoginPromptComponent } // fallback!\n\nexport const authGuard: CanMatchFn = () =>\n  inject(AuthService).isLoggedIn()\n  || inject(Router).createUrlTree(['/login']);"}, {"id": 11, "q": "What are Resolvers in Angular?", "cat": "Routing", "tags": ["ta", "to"], "a": "<p>Resolvers pre-fetch data before a route activates. The component receives fully loaded data on init — no empty/loading flash. Navigation only completes after the resolver resolves.</p>", "code": "// Functional resolver (Angular 14+)\nexport const userResolver: ResolveFn<User> = (route) =>\n  inject(UserService).getUser(route.paramMap.get('id')!);\n\n{ path: 'user/:id', component: UserComponent, resolve: { user: userResolver } }\n\nexport class UserComponent {\n  user = inject(ActivatedRoute).snapshot.data['user'] as User;\n}"}, {"id": 12, "q": "Difference between setValue and patchValue", "cat": "Forms", "tags": ["ta", "tf"], "a": "<p><b>setValue</b>: requires ALL form control keys — throws error if any are missing. <b>patchValue</b>: lenient — updates only the provided fields, ignores missing ones.</p>", "code": "form = new FormGroup({\n  name:  new FormControl(''),\n  email: new FormControl(''),\n  age:   new FormControl(0)\n});\n\nform.setValue({ name: 'Ali', email: 'a@b.com', age: 30 }); // ✅ all\nform.setValue({ name: 'Ali' }); // ❌ Error: missing fields\nform.patchValue({ name: 'Ali' }); // ✅ partial OK"}, {"id": 13, "q": "Dynamic Forms with FormArray", "cat": "Forms", "tags": ["ta", "tf"], "a": "<p>FormArray holds an ordered array of controls, perfect for dynamic fields like skills or phone numbers that users can add/remove at runtime.</p>", "code": "form = new FormGroup({\n  name: new FormControl(''),\n  skills: new FormArray([])\n});\nget skills() { return this.form.get('skills') as FormArray; }\nadd()    { this.skills.push(new FormControl('', Validators.required)); }\nremove(i) { this.skills.removeAt(i); }\n\n// Template:\n// <div formArrayName=\"skills\">\n//   <input *ngFor=\"let s of skills.controls; let i=index\" [formControlName]=\"i\">\n// </div>"}, {"id": 14, "q": "What is setControl in FormArray?", "cat": "Forms", "tags": ["ta", "tf"], "a": "<p><code>setControl(index, control)</code> replaces the control at a specific index. Cleaner than removeAt() + insert() for replacing a single row in a dynamic form.</p>", "code": "const arr = new FormArray([\n  new FormControl('Angular'),\n  new FormControl('React')\n]);\n\narr.setControl(1, new FormControl('Vue'));\narr.value; // ['Angular', 'Vue']\n\n// Replace with FormGroup (complex row)\narr.setControl(0, new FormGroup({\n  name:  new FormControl('Angular'),\n  level: new FormControl('expert')\n}));"}, {"id": 15, "q": "What are Generics in TypeScript?", "cat": "TypeScript", "tags": ["tt"], "a": "<p>Generics allow creating reusable components that work with any type while preserving type safety. Think of them as type parameters — like function parameters but for types.</p>", "code": "function identity<T>(arg: T): T { return arg; }\nidentity<string>('hello');\nidentity<number>(42);\n\ninterface ApiResponse<T> {\n  data: T; status: number; message: string;\n}\ntype UserRes = ApiResponse<User>;\ntype ListRes  = ApiResponse<User[]>;\n\n// Constrained generic\nfunction getKey<T, K extends keyof T>(obj: T, key: K): T[K] {\n  return obj[key];\n}"}, {"id": 16, "q": "switchMap vs mergeMap vs concatMap vs exhaustMap", "cat": "RxJS", "tags": ["tr"], "a": "<p><b>switchMap</b>: cancels previous inner obs (autocomplete). <b>mergeMap</b>: all concurrent (parallel uploads). <b>concatMap</b>: sequential (ordered saves). <b>exhaustMap</b>: ignores new while busy (login button).</p>", "code": "// switchMap — cancel prev (search)\ninput$.pipe(debounceTime(300), switchMap(q => api.search(q)));\n\n// mergeMap — all concurrent (uploads)\nfiles$.pipe(mergeMap(f => api.upload(f)));\n\n// concatMap — sequential (ordered)\nsaves$.pipe(concatMap(item => api.save(item)));\n\n// exhaustMap — ignore while busy (login)\nloginBtn$.pipe(exhaustMap(() => auth.login()));"}, {"id": 17, "q": "What is View Encapsulation in Angular?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Controls CSS scoping. <b>Emulated</b> (default): Angular adds unique attribute selectors. <b>ShadowDom</b>: native shadow DOM. <b>None</b>: global CSS. Use :host to target the host element.</p>", "code": "@Component({\n  encapsulation: ViewEncapsulation.Emulated  // default\n  // ViewEncapsulation.ShadowDom\n  // ViewEncapsulation.None — leaks globally!\n})\n// Emulated generates: .title[_ngcontent-c1] { color:red }\n// :host { display: block; }           — host element\n// :host(.active) { border: ... }      — host with class\n// ::ng-deep .child { ... }            — pierce (avoid)"}, {"id": 18, "q": "Angular versions and key milestones", "cat": "Misc", "tags": ["tm"], "a": "<p>Releases every 6 months. Key: v2 (rewrite), v8 (Ivy preview), v12 (Ivy default), v14 (standalone), v16 (Signals), v17 (control flow, @defer), v18-19 (Signals stable, zoneless experimental).</p>", "code": "// v14 — Standalone Components\n@Component({ standalone: true, imports: [CommonModule] })\n\n// v16 — Signals\ncount = signal(0);\n\n// v17 — New control flow\n// @if (user) { <p>{{ user.name }}</p> }\n// @for (item of list; track item.id) { ... }\n// @defer (on viewport) { <HeavyChart /> }\n\n// v18+ — Zoneless\nbootstrapApplication(App, {\n  providers: [provideExperimentalZonelessChangeDetection()]\n});"}, {"id": 19, "q": "Angular Decorators explained", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Decorators are TypeScript functions prefixed with @ that attach metadata to classes, methods, or properties. Angular uses them extensively for configuration.</p>", "code": "// Class decorators\n@Component({ selector: 'app-root', standalone: true, template: '...' })\n@Injectable({ providedIn: 'root' })\n@Pipe({ name: 'truncate', standalone: true })\n@Directive({ selector: '[appHighlight]', standalone: true })\n\n// Property decorators\n@Input() title: string;\n@Output() clicked = new EventEmitter();\n@ViewChild('el') el: ElementRef;\n@HostListener('click', ['$event']) onClick(e) {}\n@HostBinding('class.active') isActive = false;"}, {"id": 20, "q": "What is Dependency Injection in Angular?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>DI provides dependencies to classes rather than creating them inside. Angular has a hierarchical injector tree: root &rarr; module &rarr; component. Modern Angular uses inject() function.</p>", "code": "@Injectable({ providedIn: 'root' }) // root singleton\nexport class UserService {\n  private http = inject(HttpClient);\n  getAll() { return this.http.get<User[]>('/api/users'); }\n}\n\nexport class UsersPage {\n  private svc = inject(UserService);\n  users$ = this.svc.getAll(); // inline init!\n}\n\n// Scoped service (per component instance)\n@Component({ providers: [UserService] })"}, {"id": 21, "q": "What are Pipes in Angular?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Pipes transform template data without altering the source. Built-in: date, currency, uppercase, lowercase, json, async, slice, percent. Create custom pure (default) or impure pipes.</p>", "code": "{{ today | date:'dd MMM yyyy' }}\n{{ price | currency:'INR':'symbol' }}\n{{ obs$ | async }} <!-- auto subscribe/unsubscribe -->\n\n@Pipe({ name: 'truncate', pure: true, standalone: true })\nexport class TruncatePipe implements PipeTransform {\n  transform(val: string, limit = 50): string {\n    return val.length > limit\n      ? val.substring(0, limit) + '...' : val;\n  }\n}"}, {"id": 22, "q": "What is the async pipe?", "cat": "RxJS", "tags": ["ta", "tr"], "a": "<p>The async pipe subscribes to an Observable/Promise and auto-unsubscribes on component destroy. Prevents memory leaks and eliminates boilerplate subscription management.</p>", "code": "// Without async — manual, error-prone\nngOnInit()   { this.sub = svc.getUsers().subscribe(u => this.users = u); }\nngOnDestroy() { this.sub.unsubscribe(); }\n\n// With async — clean, auto-cleanup\nusers$ = this.svc.getUsers();\n// <li *ngFor=\"let u of users$ | async\">{{ u.name }}</li>\n\n// Best: single subscription\nvm$ = combineLatest({ users: users$, loading: loading$ });\n// <ng-container *ngIf=\"vm$ | async as vm\"> ... </ng-container>"}, {"id": 23, "q": "Lazy loading in Angular", "cat": "Routing", "tags": ["ta", "to"], "a": "<p>Defers loading a module/component until the user navigates to that route. Reduces initial bundle size and improves startup performance. Use loadChildren or loadComponent.</p>", "code": "// Lazy feature routes\n{ path: 'admin',\n  loadChildren: () => import('./admin/admin.routes').then(m => m.ADMIN_ROUTES)\n}\n// Lazy standalone component\n{ path: 'profile',\n  loadComponent: () => import('./profile.component')\n    .then(m => m.ProfileComponent)\n}\n// Preload all after initial load\nprovideRouter(routes, withPreloading(PreloadAllModules))"}, {"id": 24, "q": "What is a Directive in Angular?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Directives add behavior to DOM elements. <b>Component</b>: directive with template. <b>Structural</b>: change DOM structure (@if, @for). <b>Attribute</b>: change appearance/behavior without adding DOM.</p>", "code": "@Directive({ selector: '[appHighlight]', standalone: true })\nexport class HighlightDirective {\n  @Input() appHighlight = 'yellow';\n  private el = inject(ElementRef);\n\n  @HostListener('mouseenter') on() {\n    this.el.nativeElement.style.backgroundColor = this.appHighlight;\n  }\n  @HostListener('mouseleave') off() {\n    this.el.nativeElement.style.backgroundColor = '';\n  }\n}\n// <p appHighlight=\"lightblue\">Hover me!</p>"}, {"id": 25, "q": "constructor vs ngOnInit — difference", "cat": "Angular Core", "tags": ["ta"], "a": "<p><b>Constructor</b>: JavaScript instantiation, use only for DI. @Input() values are NOT set yet. <b>ngOnInit</b>: called by Angular after DI setup and @Input() initialization. Always put init logic in ngOnInit.</p>", "code": "export class UserComponent implements OnInit {\n  @Input() userId: string;\n\n  // ✅ Constructor: inject dependencies ONLY\n  constructor(private svc: UserService) {}\n\n  // ✅ ngOnInit: safe to use @Input() and services\n  ngOnInit() { this.svc.getUser(this.userId).subscribe(...); }\n\n  // ❌ Bad: @Input() not set in constructor!\n  // constructor() { console.log(this.userId); } // undefined!"}, {"id": 26, "q": "Subject vs BehaviorSubject vs ReplaySubject", "cat": "RxJS", "tags": ["tr"], "a": "<p><b>Subject</b>: no initial value, late subscribers miss past emissions. <b>BehaviorSubject</b>: holds current value, late subscribers get it immediately. <b>ReplaySubject(n)</b>: replays last n values.</p>", "code": "// Subject — late subscriber misses past\nconst s = new Subject<number>();\ns.next(1); // lost — no subscriber yet\ns.subscribe(v => console.log(v)); // gets future only\n\n// BehaviorSubject — has current value\nconst bs = new BehaviorSubject(0);\nbs.subscribe(v => console.log(v)); // gets 0 immediately\nbs.next(42); bs.value; // sync access: 42\n\n// ReplaySubject — replays last N\nconst rs = new ReplaySubject(3);\n[1,2,3,4].forEach(v => rs.next(v));\nrs.subscribe(v => console.log(v)); // 2, 3, 4"}, {"id": 27, "q": "Angular Route Guards", "cat": "Routing", "tags": ["ta", "to"], "a": "<p>Guards control navigation. Types: canActivate, canDeactivate, canMatch. Angular 14+ prefers functional guards using inject().</p>", "code": "export const authGuard: CanActivateFn = (route, state) => {\n  const auth = inject(AuthService);\n  return auth.isLoggedIn()\n    ? true\n    : inject(Router).createUrlTree(['/login'],\n        { queryParams: { returnUrl: state.url } });\n};\n\n// canDeactivate — confirm unsaved changes\nexport const unsavedGuard: CanDeactivateFn<EditComponent> = (comp) =>\n  comp.isDirty() ? confirm('Leave without saving?') : true;"}, {"id": 28, "q": "Angular Router configuration and navigation", "cat": "Routing", "tags": ["ta", "to"], "a": "<p>Configure routes in app.routes.ts and provide with provideRouter(). Supports child routes, guards, resolvers, lazy loading. Navigate with Router service or routerLink.</p>", "code": "export const routes: Routes = [\n  { path: '', redirectTo: 'home', pathMatch: 'full' },\n  { path: 'home', component: HomeComponent },\n  { path: 'user/:id', component: UserComponent, canActivate: [authGuard] },\n  { path: '**', component: NotFoundComponent }\n];\n// app.config.ts\nproviders: [provideRouter(routes, withPreloading(PreloadAllModules))]\n\nrouter.navigate(['/user', id], { queryParams: { tab: 'info' } });\n// <a [routerLink]=\"['/user', id]\" routerLinkActive=\"active\">"}, {"id": 29, "q": "Content Projection with ng-content", "cat": "Angular Core", "tags": ["ta"], "a": "<p>ng-content is Angular's slot mechanism projecting parent content into a child component. Supports named slots with the select attribute for multiple projection points.</p>", "code": "<!-- card.component.html -->\n<div class=\"card\">\n  <div class=\"header\">\n    <ng-content select=\"[card-title]\"></ng-content>\n  </div>\n  <ng-content></ng-content> <!-- default slot -->\n</div>\n\n<!-- Usage -->\n<app-card>\n  <h2 card-title>My Title</h2>\n  <p>Body content projected here</p>\n</app-card>"}, {"id": 30, "q": "TrackBy in ngFor — why use it?", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>trackBy tells Angular how to identify list items by identity. Without it, Angular re-renders ALL DOM nodes when the list changes. With trackBy, only changed items are patched — critical for performance.</p>", "code": "<!-- Without trackBy — re-renders ALL DOM nodes -->\n<li *ngFor=\"let user of users\">{{ user.name }}</li>\n\n<!-- With trackBy — only diffs changed items -->\n<li *ngFor=\"let user of users; trackBy: trackById\">{{ user.name }}</li>\n\n// Component\ntrackById(i: number, user: User) { return user.id; }\n\n// Angular 17+ @for (track mandatory!)\n@for (user of users; track user.id) {\n  <li>{{ user.name }}</li>\n}"}, {"id": 31, "q": "Angular 17+ control flow: @if, @for, @switch", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Built-in control flow replaces *ngIf, *ngFor, ngSwitch in Angular 17. Better performance, type narrowing in @if, no CommonModule required, @for requires track.</p>", "code": "@if (user) {\n  <p>{{ user.name }}</p>\n} @else if (loading()) { <spinner /> }\n@else { <p>Please login</p> }\n\n@for (item of items; track item.id) {\n  <li>{{ item.name }}</li>\n} @empty { <li>No items</li> }\n\n@switch (status) {\n  @case ('active')   { <span>Active</span> }\n  @case ('inactive') { <span>Inactive</span> }\n  @default           { <span>Unknown</span> }\n}"}, {"id": 32, "q": "@defer in Angular 17+", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>@defer declaratively lazy-loads template blocks. Components inside @defer are not downloaded until the trigger fires. Supports placeholder, loading, and error fallback states.</p>", "code": "@defer (on viewport) {\n  <heavy-chart-component />\n} @placeholder { <div>Chart loading...</div> }\n@loading (minimum 300ms) { <spinner /> }\n@error { <p>Failed to load</p> }\n\n<!-- Other triggers -->\n@defer (on idle)              <!-- browser idle -->\n@defer (on interaction(btn))  <!-- clicks #btn -->\n@defer (on hover(card))       <!-- hover -->\n@defer (when isLoggedIn())    <!-- boolean signal -->"}, {"id": 33, "q": "Angular Universal (SSR)", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>Renders apps on the server for better SEO, faster initial paint, and social media previews. Angular 17+ uses @angular/ssr. Hydration transfers server state to client.</p>", "code": "# Add SSR\nng add @angular/ssr\n\n// Guard browser-only APIs\nimport { isPlatformBrowser } from '@angular/common';\nexport class MyComponent {\n  private isBrowser = isPlatformBrowser(inject(PLATFORM_ID));\n  ngOnInit() {\n    if (this.isBrowser) {\n      // safe: localStorage, window, document\n      localStorage.getItem('token');\n    }\n  }\n}"}, {"id": 34, "q": "Standalone Components in Angular 14+", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Standalone components don't need NgModule — they declare their own imports directly. Default in Angular 17+ projects. Enables simpler architecture and better tree-shaking.</p>", "code": "@Component({\n  selector: 'app-user-card',\n  standalone: true,\n  imports: [CommonModule, RouterLink, DatePipe],\n  template: `\n    <h2>{{ user.name }}</h2>\n    <a [routerLink]=\"['/user', user.id]\">View</a>\n  `\n})\nexport class UserCardComponent {\n  @Input({required: true}) user!: User;\n}\n\n// Bootstrap — no AppModule!\nbootstrapApplication(App, {\n  providers: [provideRouter(routes), provideHttpClient()]\n});"}, {"id": 35, "q": "AOT compilation in Angular", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>AOT (Ahead-of-Time) compiles templates at build time. Benefits: faster rendering (no in-browser compilation), smaller bundles, catches template errors at compile time rather than runtime.</p>", "code": "# Production uses AOT by default\nng build --configuration=production\n\n// AOT catches template errors at build time:\n// <p>{{ user.nme }}</p>\n// ❌ Error: Property 'nme' does not exist on type 'User'\n\n// Enable strict template checks:\n// tsconfig.json\n{\n  \"angularCompilerOptions\": {\n    \"strictTemplates\": true\n  }\n}"}, {"id": 36, "q": "ViewChild and ContentChild", "cat": "Angular Core", "tags": ["ta"], "a": "<p><b>ViewChild</b>: queries component's own template. <b>ContentChild</b>: queries projected ng-content. Both available after AfterViewInit / AfterContentInit hooks.</p>", "code": "@Component({ template: `\n  <input #nameInput>\n  <app-child #child></app-child>\n  <ng-content></ng-content>\n`})\nexport class ParentComponent implements AfterViewInit {\n  @ViewChild('nameInput') input!: ElementRef;\n  @ViewChild('child') child!: ChildComponent;\n  @ViewChildren(ItemComponent) items!: QueryList<ItemComponent>;\n  @ContentChild(HeaderComponent) header!: HeaderComponent;\n\n  ngAfterViewInit() { this.input.nativeElement.focus(); }\n}"}, {"id": 37, "q": "Observable vs Promise", "cat": "RxJS", "tags": ["tr", "tj"], "a": "<p><b>Promise</b>: single value, eager (starts immediately), not cancellable. <b>Observable</b>: 0-N values, lazy (starts on subscribe), cancellable, composable with operators.</p>", "code": "// Promise — eager, single value\nconst p = fetch('/api'); // starts immediately\n\n// Observable — lazy, cancellable, multiple values\nconst o$ = interval(1000); // nothing runs yet\nconst sub = o$.subscribe(v => console.log(v)); // starts\nsub.unsubscribe(); // cancel!\n\n// Convert\nfirstValueFrom(observable$); // Obs → Promise\nfrom(promise);                // Promise → Obs"}, {"id": 38, "q": "TypeScript Utility Types", "cat": "TypeScript", "tags": ["tt"], "a": "<p>Built-in utilities transform existing types. Key ones: Partial, Required, Readonly, Pick, Omit, Record, Exclude, NonNullable, ReturnType, Parameters.</p>", "code": "interface User { id: number; name: string; email: string; }\n\ntype P  = Partial<User>;              // all optional\ntype RO = Readonly<User>;             // all readonly\ntype Pv = Pick<User, 'id'|'name'>;   // subset\ntype Pb = Omit<User, 'email'>;       // exclude\ntype Dc = Record<string, User>;       // key-value\ntype NN = NonNullable<string|null>;  // string\ntype RT = ReturnType<typeof fetch>;   // Promise<Response>"}, {"id": 39, "q": "Zone.js and Angular moving away from it", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>Zone.js patches browser async APIs to trigger change detection. Adds overhead and complexity. Angular 18+ supports zoneless mode with Signals for better performance.</p>", "code": "// Traditional — Zone.js triggers CD\nsetTimeout(() => { this.data = 'updated'; }, 1000);\n\n// Zoneless (Angular 18+)\nbootstrapApplication(App, {\n  providers: [provideExperimentalZonelessChangeDetection()]\n});\n// Remove 'zone.js' from angular.json polyfills\n\n// With Signals — no Zone needed\ndata = signal('initial');\nsetTimeout(() => this.data.set('updated'), 1000);"}, {"id": 40, "q": "RxJS: forkJoin vs combineLatest vs zip", "cat": "RxJS", "tags": ["tr"], "a": "<p><b>forkJoin</b>: waits for all to complete, emits last values (like Promise.all). <b>combineLatest</b>: emits when any source emits, using latest from each. <b>zip</b>: pairs values by index.</p>", "code": "// forkJoin — parallel HTTP, wait for all\nforkJoin({ users: http.get('/users'), roles: http.get('/roles') })\n  .subscribe(({ users, roles }) => { /* both done */ });\n\n// combineLatest — reactive UI state\ncombineLatest({ users: users$, filter: filter$ })\n  .subscribe(({ users, filter }) => this.apply(users, filter));\n\n// zip — pair by index\nzip(of('A','B'), of(1,2))\n  .subscribe(([l, n]) => console.log(l, n)); // A 1, B 2"}, {"id": 41, "q": "Angular inject() function", "cat": "Angular Core", "tags": ["ta"], "a": "<p>inject() is a functional DI API (Angular 14+) for accessing the injector. Works in component fields, guards, resolvers — anywhere in an injection context. Cleaner than constructor injection.</p>", "code": "export class UserPage {\n  private svc    = inject(UserService);\n  private router = inject(Router);\n  users$ = inject(UserService).getAll(); // inline init!\n}\n\n// In functional guards\nexport const guard: CanActivateFn = () =>\n  inject(AuthService).isLoggedIn();\n\n// In factory providers\n{ provide: LogService, useFactory: () => {\n  const http = inject(HttpClient);\n  return new LogService(http);\n}}"}, {"id": 42, "q": "Angular HttpClient usage", "cat": "HTTP", "tags": ["ta"], "a": "<p>HttpClient provides type-safe observable-based HTTP. Setup with provideHttpClient() in Angular 15+. Supports typed responses, request options, and interceptors.</p>", "code": "providers: [provideHttpClient(withInterceptorsFromDi())]\n\n@Injectable({ providedIn: 'root' })\nexport class UserService {\n  private http = inject(HttpClient);\n  private api = '/api/users';\n  getAll()    { return this.http.get<User[]>(this.api); }\n  getOne(id)  { return this.http.get<User>(`${this.api}/${id}`); }\n  create(u)   { return this.http.post<User>(this.api, u); }\n  update(id,u){ return this.http.patch<User>(`${this.api}/${id}`,u); }\n  delete(id)  { return this.http.delete(`${this.api}/${id}`); }\n}"}, {"id": 43, "q": "Template-driven vs Reactive Forms", "cat": "Forms", "tags": ["ta", "tf"], "a": "<p><b>Template-driven</b>: simple, ngModel, less code. <b>Reactive</b>: programmatic, FormGroup/FormControl in class — better for complex validation, dynamic fields, and unit testing.</p>", "code": "// Template-driven\n<form #f=\"ngForm\" (ngSubmit)=\"submit(f)\">\n  <input name=\"email\" [(ngModel)]=\"email\" required email>\n</form>\n\n// Reactive\nform = new FormGroup({\n  email:    new FormControl('', [Validators.required, Validators.email]),\n  password: new FormControl('', Validators.minLength(8))\n});\n// <form [formGroup]=\"form\" (ngSubmit)=\"submit()\">\n//   <input formControlName=\"email\">\n// </form>"}, {"id": 44, "q": "Custom Validators in Angular Forms", "cat": "Forms", "tags": ["ta", "tf"], "a": "<p>Custom validators return ValidationErrors (or null if valid). Can be sync or async (for server-side checks). Apply to a single control or entire FormGroup for cross-field validation.</p>", "code": "// Sync validator\nexport function noSpaceValidator(ctrl: AbstractControl): ValidationErrors | null {\n  return ctrl.value?.includes(' ') ? { noSpace: true } : null;\n}\n// Async validator\nexport function emailTakenValidator(svc: UserService): AsyncValidatorFn {\n  return (ctrl) => svc.checkEmail(ctrl.value).pipe(\n    map(taken => taken ? { emailTaken: true } : null),\n    catchError(() => of(null))\n  );\n}\n// Usage:\nemail: new FormControl('',\n  [Validators.required, noSpaceValidator],\n  [emailTakenValidator(this.svc)])"}, {"id": 45, "q": "Angular NgModule explained", "cat": "Angular Core", "tags": ["ta"], "a": "<p>NgModule organizes related components, directives, pipes, and services. With Angular 14+ standalone components, NgModules are optional but still widely used in existing codebases.</p>", "code": "@NgModule({\n  declarations: [AppComponent, UserListComponent],\n  imports:      [BrowserModule, HttpClientModule, RouterModule],\n  exports:      [UserListComponent], // share with others\n  providers:    [UserService],        // module-scoped\n  bootstrap:    [AppComponent]\n})\nexport class AppModule {}\n\n// Feature module\n@NgModule({\n  declarations: [AdminDashboardComponent],\n  imports: [SharedModule, RouterModule.forChild(adminRoutes)]\n})\nexport class AdminModule {}"}, {"id": 46, "q": "CORS handling in Angular", "cat": "HTTP", "tags": ["ta"], "a": "<p>CORS is a browser security policy. In Angular dev, use a proxy config to bypass it. In production, configure CORS headers on the server.</p>", "code": "// proxy.conf.json — dev proxy\n{\n  \"/api\": {\n    \"target\": \"http://localhost:3000\",\n    \"changeOrigin\": true,\n    \"pathRewrite\": { \"^/api\": \"\" }\n  }\n}\n// angular.json: \"serve\" > \"options\" > \"proxyConfig\": \"proxy.conf.json\"\n\n// Server-side (Node/Express)\napp.use(cors({\n  origin: 'https://myapp.com',\n  methods: ['GET','POST','PUT','DELETE'],\n  credentials: true\n}));"}, {"id": 47, "q": "Angular CDK (Component Dev Kit)", "cat": "Angular Core", "tags": ["ta"], "a": "<p>CDK provides unstyled primitives: drag-drop, virtual scrolling, overlay, accessibility, clipboard, portals. Use as foundation for custom UI libraries or directly in applications.</p>", "code": "// Virtual scrolling — renders only visible items\n<cdk-virtual-scroll-viewport itemSize=\"56\" style=\"height:400px\">\n  <div *cdkVirtualFor=\"let item of items\">{{ item.name }}</div>\n</cdk-virtual-scroll-viewport>\n\n// Drag & Drop\n<div cdkDropList (cdkDropListDropped)=\"drop($event)\">\n  <div *ngFor=\"let item of list\" cdkDrag>{{ item }}</div>\n</div>\ndrop(event: CdkDragDrop<string[]>) {\n  moveItemInArray(this.list, event.previousIndex, event.currentIndex);\n}"}, {"id": 48, "q": "TypeScript strict mode", "cat": "TypeScript", "tags": ["tt"], "a": "<p>strict:true enables: strictNullChecks, strictFunctionTypes, strictPropertyInitialization, noImplicitAny, noImplicitThis. Catches bugs at compile time that would crash at runtime.</p>", "code": "// tsconfig.json\n{ \"compilerOptions\": { \"strict\": true } }\n\n// strictNullChecks — must handle null/undefined\nfunction greet(name: string | null) {\n  return name?.toUpperCase() ?? 'GUEST';\n}\n\n// strictPropertyInitialization\nclass User {\n  name!: string;      // ! = definitely assigned\n  email: string = ''; // or initialize directly\n}"}, {"id": 49, "q": "Angular Material", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Google's Material Design component library — 50+ accessible, theme-able components. Use for rapid UI development when Material Design fits the brand.</p>", "code": "# ng add @angular/material\n\n// Data table with sort + pagination\n<mat-table [dataSource]=\"dataSource\" matSort>\n  <ng-container matColumnDef=\"name\">\n    <mat-header-cell *matHeaderCellDef mat-sort-header>Name</mat-header-cell>\n    <mat-cell *matCellDef=\"let row\">{{ row.name }}</mat-cell>\n  </ng-container>\n  <mat-header-row *matHeaderRowDef=\"cols\"></mat-header-row>\n  <mat-row *matRowDef=\"let row; columns: cols\"></mat-row>\n</mat-table>\n<mat-paginator [pageSize]=\"10\"></mat-paginator>"}, {"id": 50, "q": "Memory Leaks in Angular — how to prevent", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>Memory leaks occur when subscriptions outlive components. Prevent with: async pipe (auto-unsubscribes), takeUntilDestroyed (Angular 16+), or manual unsubscribe in ngOnDestroy.</p>", "code": "// ❌ Leak — subscription never ends\nngOnInit() { interval(1000).subscribe(v => this.count = v); }\n\n// ✅ async pipe\ncount$ = interval(1000);\n// {{ count$ | async }}\n\n// ✅ takeUntilDestroyed (Angular 16+)\nprivate destroyRef = inject(DestroyRef);\nngOnInit() {\n  interval(1000).pipe(takeUntilDestroyed(this.destroyRef))\n    .subscribe(v => this.count = v);\n}\n\n// ✅ manual\nprivate sub = new Subscription();\nngOnDestroy() { this.sub.unsubscribe(); }"}, {"id": 51, "q": "Angular Router preloading strategies", "cat": "Routing", "tags": ["ta", "to"], "a": "<p>After app loads, preloading downloads lazy modules in the background. PreloadAllModules loads everything. Custom strategy loads only routes flagged in route data.</p>", "code": "provideRouter(routes, withPreloading(PreloadAllModules))\n\n@Injectable({ providedIn: 'root' })\nexport class SelectivePreload implements PreloadingStrategy {\n  preload(route: Route, load: () => Observable<any>) {\n    return route.data?.preload ? load() : EMPTY;\n  }\n}\n// Mark routes: data: { preload: true }"}, {"id": 52, "q": "TypeScript Decorators", "cat": "TypeScript", "tags": ["tt"], "a": "<p>Decorators are functions that modify classes, methods, or properties at declaration time. Angular uses them extensively. Enable with experimentalDecorators in tsconfig.</p>", "code": "function Log(target: any, key: string, desc: PropertyDescriptor) {\n  const orig = desc.value;\n  desc.value = function(...args: any[]) {\n    console.log(`Calling ${key}`, args);\n    const result = orig.apply(this, args);\n    console.log(`${key} returned`, result);\n    return result;\n  };\n}\nclass Calc {\n  @Log\n  add(a: number, b: number) { return a + b; }\n}\nnew Calc().add(2, 3); // logs call and result"}, {"id": 53, "q": "Pure vs Impure Pipes", "cat": "Angular Core", "tags": ["ta"], "a": "<p><b>Pure</b> (default): re-runs only when input reference changes. <b>Impure</b>: re-runs on every change detection cycle. Use computed() signals instead of impure pipes for best performance.</p>", "code": "// Pure (default) — only reruns on reference change\n@Pipe({ name: 'double', pure: true })\nexport class DoublePipe implements PipeTransform {\n  transform(val: number) { return val * 2; }\n}\n\n// Impure — runs every CD cycle (avoid!)\n@Pipe({ name: 'filter', pure: false })\nexport class FilterPipe implements PipeTransform {\n  transform(items: any[], search: string) {\n    return items.filter(i => i.name.includes(search));\n  }\n}\n// Better: filtered = computed(() => items().filter(...))"}, {"id": 54, "q": "Signal-based input() and output() (v17.1+)", "cat": "Signals", "tags": ["ta"], "a": "<p>input() returns a Signal directly. output() replaces @Output(). model() is a two-way binding signal. input.required() for required inputs. Cleaner than @Input()/@Output() decorators.</p>", "code": "import { input, output, model } from '@angular/core';\nexport class UserForm {\n  userId = input.required<number>();   // required Signal\n  label  = input('Save');              // optional w/ default\n  value  = model('');                  // two-way signal\n  saved  = output<{id:number}>();      // signal output\n\n  save() { this.saved.emit({ id: this.userId() }); }\n}\n// <app-user-form [userId]=\"5\" (saved)=\"onSave($event)\">"}, {"id": 55, "q": "ActivatedRoute — reading route data", "cat": "Routing", "tags": ["ta", "to"], "a": "<p>ActivatedRoute provides route info: params, queryParams, data, fragment. Use snapshot for one-time reads; observables for dynamic param changes in reused components.</p>", "code": "export class UserDetail implements OnInit {\n  private route = inject(ActivatedRoute);\n  ngOnInit() {\n    // Snapshot — one-time read\n    const id   = this.route.snapshot.paramMap.get('id')!;\n    const user = this.route.snapshot.data['user'];\n    const tab  = this.route.snapshot.queryParamMap.get('tab');\n\n    // Observable — for param changes (reused component)\n    this.route.paramMap.pipe(\n      map(p => p.get('id')!),\n      switchMap(id => this.svc.getUser(id))\n    ).subscribe(u => this.user = u);\n  }\n}"}, {"id": 56, "q": "Template reference variables vs ViewChild", "cat": "Angular Core", "tags": ["ta"], "a": "<p><b>#ref</b>: template-scope only, used inline. <b>ViewChild</b>: brings reference into component class for programmatic access — available after AfterViewInit.</p>", "code": "<!-- #ref — template scope only -->\n<input #search (keyup.enter)=\"filter(search.value)\">\n<button (click)=\"search.focus()\">Focus</button>\n\n// ViewChild — component class access\n@Component({ template: `<canvas #chart></canvas>` })\nexport class ChartComponent implements AfterViewInit {\n  @ViewChild('chart') canvas!: ElementRef<HTMLCanvasElement>;\n  ngAfterViewInit() {\n    // Available here — NOT in ngOnInit!\n    const ctx = this.canvas.nativeElement.getContext('2d');\n  }\n}"}, {"id": 57, "q": "Angular CLI — important commands", "cat": "Misc", "tags": ["tm"], "a": "<p>Angular CLI automates scaffolding, generation, building, testing, and deployment. Essential for consistent code patterns and optimized production bundles.</p>", "code": "# Create & serve\nng new my-app --standalone --routing --style=scss\nng serve --open --port 4201\n\n# Generate\nng g component features/user-list --standalone\nng g service core/services/user\nng g pipe shared/pipes/truncate --standalone\nng g directive shared/directives/highlight --standalone\nng g guard core/guards/auth --functional\nng g interface models/user\n\n# Build & analyze\nng build --configuration=production --stats-json\nnpx webpack-bundle-analyzer dist/stats.json"}, {"id": 58, "q": "APP_INITIALIZER in Angular", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Runs factory functions before the app bootstraps. Use to load runtime config, check auth, or fetch required data before any component renders.</p>", "code": "@Injectable({ providedIn: 'root' })\nexport class ConfigService {\n  config!: AppConfig;\n  load() {\n    return inject(HttpClient)\n      .get<AppConfig>('/assets/config.json')\n      .pipe(tap(cfg => this.config = cfg)).toPromise();\n  }\n}\nproviders: [{\n  provide: APP_INITIALIZER,\n  useFactory: (cfg: ConfigService) => () => cfg.load(),\n  deps: [ConfigService], multi: true\n}]\n// App won't render until load() resolves!"}, {"id": 59, "q": "TypeScript type narrowing", "cat": "TypeScript", "tags": ["tt"], "a": "<p>Type narrowing refines broad types using runtime checks. TypeScript understands typeof, instanceof, in operator, discriminated unions, and custom type guards (is keyword).</p>", "code": "type Shape = { kind: 'circle'; r: number } | { kind: 'rect'; w: number; h: number };\n\nfunction area(s: Shape) {\n  switch (s.kind) {\n    case 'circle': return Math.PI * s.r ** 2;\n    case 'rect':   return s.w * s.h;\n  }\n}\n\n// Custom type guard\nfunction isUser(x: unknown): x is User {\n  return typeof (x as any)?.name === 'string';\n}\nif (isUser(x)) console.log(x.name); // x is User here"}, {"id": 60, "q": "ng-template vs ng-container vs ng-content", "cat": "Angular Core", "tags": ["ta"], "a": "<p><b>ng-template</b>: reusable fragment, not rendered by default. <b>ng-container</b>: logical group with no DOM output. <b>ng-content</b>: slot for parent-projected content.</p>", "code": "<!-- ng-template: reusable fragment -->\n<ng-template #loadingTpl><spinner/></ng-template>\n<ng-container *ngTemplateOutlet=\"loading ? loadingTpl : null\"></ng-container>\n\n<!-- ng-container: no DOM, groups directives -->\n<ng-container *ngIf=\"user\">\n  <p>{{ user.name }}</p>\n  <p>{{ user.email }}</p>\n</ng-container>\n\n<!-- ng-content: slot projection -->\n<div class=\"modal\">\n  <ng-content select=\"[modal-header]\"></ng-content>\n  <ng-content></ng-content>\n</div>"}, {"id": 61, "q": "EnvironmentInjector and injection contexts", "cat": "Angular Core", "tags": ["ta"], "a": "<p>EnvironmentInjector (Angular 14+) is the root/module-level injector. runInInjectionContext() enables inject() outside constructor or field initializer contexts.</p>", "code": "import { runInInjectionContext, EnvironmentInjector } from '@angular/core';\nexport class DynamicService {\n  private injector = inject(EnvironmentInjector);\n  doWork() {\n    runInInjectionContext(this.injector, () => {\n      const http   = inject(HttpClient);  // safe!\n      const router = inject(Router);\n    });\n  }\n}\n// Dynamic component creation\nconst ref = createComponent(MyComp, { environmentInjector: this.injector });"}, {"id": 62, "q": "Angular linkedSignal (v19)", "cat": "Signals", "tags": ["ta"], "a": "<p>linkedSignal creates a writable signal that resets to a computed value when its source signal changes. Solves the need for a derived-but-writable signal — like pagination resetting when filters change.</p>", "code": "import { signal, linkedSignal } from '@angular/core';\nexport class ProductList {\n  category = signal('all');\n\n  // Resets to 0 when category changes\n  currentPage = linkedSignal({\n    source: this.category,\n    computation: () => 0\n  });\n\n  nextPage() {\n    this.currentPage.update(p => p + 1); // writable!\n  }\n  changeCategory(c: string) {\n    this.category.set(c); // auto-resets currentPage to 0\n  }\n}"}, {"id": 63, "q": "Angular resource() API (v19)", "cat": "Signals", "tags": ["ta"], "a": "<p>resource() is signal-based async data loading. Manages loading/error state automatically and reloads when signal dependencies change. Replaces manual subscribe/loading patterns.</p>", "code": "import { resource, signal } from '@angular/core';\nexport class UserDetail {\n  userId = signal(1);\n  userResource = resource({\n    request: () => this.userId(),\n    loader: ({ request: id }) =>\n      fetch(`/api/users/${id}`).then(r => r.json())\n  });\n  user      = this.userResource.value;\n  isLoading = this.userResource.isLoading;\n  error     = this.userResource.error;\n\n  viewUser(id: number) { this.userId.set(id); } // auto reloads!\n}"}, {"id": 64, "q": "RxJS error handling — catchError, retry, finalize", "cat": "RxJS", "tags": ["tr", "ta"], "a": "<p>Handle stream errors with catchError (recover/rethrow), retry (auto-retry on error), and finalize (cleanup that always runs). Layer operators for robust error management.</p>", "code": "users$ = http.get<User[]>('/api/users').pipe(\n  retry({ count: 3, delay: 1000 }),\n  catchError(err => {\n    if (err.status === 404) return of([]);    // fallback\n    if (err.status === 403) {\n      router.navigate(['/forbidden']);\n      return EMPTY;\n    }\n    return throwError(() => err);             // rethrow\n  }),\n  finalize(() => loading.set(false))         // always runs\n);"}, {"id": 65, "q": "@HostListener vs (event) binding", "cat": "Angular Core", "tags": ["ta"], "a": "<p><b>(event)</b>: binds to elements in the component's own template. <b>@HostListener</b>: listens to events on the component's host element — essential for directives and global events.</p>", "code": "<!-- Template event binding -->\n<button (click)=\"save()\">Save</button>\n\n// @HostListener — host/directive events\n@Directive({ selector: '[appTooltip]' })\nexport class TooltipDirective {\n  @HostListener('mouseenter') show() {}\n  @HostListener('mouseleave') hide() {}\n  @HostListener('window:keydown.escape') onEsc() {}\n  @HostListener('document:click', ['$event']) onDocClick(e) {}\n}"}, {"id": 66, "q": "toSignal() and toObservable() interop", "cat": "Signals", "tags": ["ta", "tr"], "a": "<p>toSignal() converts Observable to Signal (auto-subscribes, auto-unsubscribes). toObservable() converts Signal to Observable enabling RxJS operators on signal changes.</p>", "code": "import { toSignal, toObservable } from '@angular/core/rxjs-interop';\nexport class SearchPage {\n  // Observable → Signal\n  users = toSignal(svc.getAll(), { initialValue: [] });\n  searchQuery = signal('');\n\n  // Signal → Observable (for debouncing)\n  results = toSignal(\n    toObservable(this.searchQuery).pipe(\n      debounceTime(300),\n      distinctUntilChanged(),\n      switchMap(q => svc.search(q))\n    ),\n    { initialValue: [] }\n  );\n}"}, {"id": 67, "q": "Angular Ivy renderer", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>Ivy is Angular's compiler/runtime (default v12+). Benefits: smaller bundles via tree-shaking, better debugging with component names in errors, faster builds, strict template type-checking.</p>", "code": "// Ivy is always on in Angular 12+ — no config needed\n\n// Runtime inspection in browser DevTools console:\nng.getComponent(document.querySelector('app-root'));\nng.getContext(element);\n\n// Strict templates — catch errors at build time\n// tsconfig.json:\n{\n  \"angularCompilerOptions\": {\n    \"strictTemplates\": true,\n    \"strictInputAccessModifiers\": true\n  }\n}"}, {"id": 68, "q": "inject() vs constructor injection", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Functionally equivalent. inject() (Angular 14+) is preferred: cleaner without constructor boilerplate, enables inline field initialization, works in functional guards/resolvers.</p>", "code": "// Old: constructor injection\nexport class OldComponent {\n  constructor(private svc: UserService, private router: Router) {}\n  ngOnInit() { this.svc.load(); }\n}\n\n// Modern: field injection\nexport class NewComponent {\n  private svc    = inject(UserService);\n  private router = inject(Router);\n  // Inline init — no ngOnInit needed!\n  users$ = inject(UserService).getAll();\n}"}, {"id": 69, "q": "Mapped types and conditional types in TypeScript", "cat": "TypeScript", "tags": ["tt"], "a": "<p>Mapped types transform each property. Conditional types select based on conditions (T extends X ? Y : Z). Combined, they power advanced utility types.</p>", "code": "// Mapped type\ntype Nullable<T> = { [K in keyof T]: T[K] | null };\ntype Mutable<T>  = { -readonly [K in keyof T]: T[K] };\n\n// Conditional type\ntype IsArray<T> = T extends any[] ? 'yes' : 'no';\ntype A = IsArray<User[]>; // 'yes'\n\n// infer — extract inner type\ntype Unwrap<T>  = T extends (infer U)[]     ? U : T;\ntype UnwrapP<T> = T extends Promise<infer U> ? U : T;\ntype C = Unwrap<User[]>; // User"}, {"id": 70, "q": "Functional HTTP interceptors (Angular 15+)", "cat": "HTTP", "tags": ["ta"], "a": "<p>Functional interceptors replace class-based ones. Use inject() directly, no class boilerplate. Register with withInterceptors() in provideHttpClient().</p>", "code": "// Logging interceptor\nexport const loggingInterceptor: HttpInterceptorFn = (req, next) => {\n  const start = Date.now();\n  return next(req).pipe(\n    tap(() => console.log(`${req.method} ${req.url} ${Date.now()-start}ms`))\n  );\n};\n// Auth interceptor\nexport const authInterceptor: HttpInterceptorFn = (req, next) => {\n  const token = inject(AuthService).getToken();\n  return next(token ? req.clone({\n    setHeaders: { Authorization: `Bearer ${token}` }\n  }) : req);\n};\nprovideHttpClient(withInterceptors([loggingInterceptor, authInterceptor]))"}, {"id": 71, "q": "Angular @let template syntax (v18+)", "cat": "Angular Core", "tags": ["ta"], "a": "<p>@let declares local template variables — clean replacement for the *ngIf-as pattern. Works with any expression including async pipe results and signal calls.</p>", "code": "<!-- Old: *ngIf as workaround -->\n<ng-container *ngIf=\"(user$ | async) as user\">\n  <p>{{ user.name }}</p>\n</ng-container>\n\n<!-- New: @let (Angular 18+) -->\n@let user = user$ | async;\n@let name = user?.firstName + ' ' + user?.lastName;\n\n@if (user) {\n  <h1>{{ name }}</h1>\n  <p>{{ user.email }}</p>\n}\n<!-- Works with signals -->\n@let count = this.count();\n<p>{{ count }} x 2 = {{ count * 2 }}</p>"}, {"id": 72, "q": "Angular httpResource() (v19 experimental)", "cat": "HTTP", "tags": ["ta"], "a": "<p>httpResource() combines HttpClient with the resource API for declarative signal-based HTTP. Auto-reloads when signal dependencies change — no manual subscriptions needed.</p>", "code": "import { httpResource } from '@angular/common/http';\nexport class UsersPage {\n  page   = signal(1);\n  search = signal('');\n\n  // Auto-reloads when page or search signals change\n  usersResource = httpResource<User[]>(() => ({\n    url: '/api/users',\n    params: { page: this.page(), search: this.search() }\n  }));\n  users   = this.usersResource.value;\n  loading = this.usersResource.isLoading;\n  error   = this.usersResource.error;\n  nextPage() { this.page.update(p => p + 1); }\n}"}, {"id": 73, "q": "Singleton pattern in Angular", "cat": "Angular Core", "tags": ["ta", "tj"], "a": "<p>Singleton ensures one instance is shared across the app. Angular services with providedIn:'root' are singletons automatically — all components share the same service instance.</p>", "code": "@Injectable({ providedIn: 'root' }) // singleton\nexport class CartService {\n  private items = signal<CartItem[]>([]);\n  total = computed(() => this.items().reduce((s,i) => s + i.price, 0));\n  add(item) { this.items.update(l => [...l, item]); }\n}\n\n// JS Singleton pattern\nclass Config {\n  private static inst: Config;\n  private constructor() {}\n  static getInstance() {\n    return Config.inst ??= new Config();\n  }\n}"}, {"id": 74, "q": "withComponentInputBinding() — route params as @Input", "cat": "Routing", "tags": ["ta", "to"], "a": "<p>withComponentInputBinding() (Angular 16+) maps route params, query params, and resolved data to component @Input() properties automatically — no ActivatedRoute injection needed.</p>", "code": "provideRouter(routes, withComponentInputBinding())\n\n{ path: 'user/:id', component: UserComponent, resolve: { user: userResolver } }\n\n// Component — no ActivatedRoute needed!\nexport class UserComponent {\n  @Input() id!:   string;  // <- route param :id\n  @Input() tab?:  string;  // <- query param ?tab=\n  @Input() user!: User;    // <- resolve data\n  // Or: id = input.required<string>();\n}"}, {"id": 75, "q": "takeUntilDestroyed — modern unsubscribe pattern", "cat": "RxJS", "tags": ["tr", "ta"], "a": "<p>takeUntilDestroyed (Angular 16+) auto-completes subscriptions when the injection context (component/directive) is destroyed. Zero ngOnDestroy boilerplate — the cleanest pattern.</p>", "code": "import { takeUntilDestroyed } from '@angular/core/rxjs-interop';\nexport class LiveData {\n  // Works in class field (injection context)\n  data$ = inject(DataService).stream().pipe(\n    takeUntilDestroyed()  // auto-cleanup!\n  );\n\n  // Outside injection context — pass DestroyRef\n  private destroyRef = inject(DestroyRef);\n  subscribeOnDemand() {\n    interval(1000).pipe(\n      takeUntilDestroyed(this.destroyRef)\n    ).subscribe(v => this.tick = v);\n  }\n}\n// Zero ngOnDestroy needed!"}, {"id": 76, "q": "Top Angular performance optimization techniques", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>Key optimizations: OnPush + Signals (fine-grained CD), @for track (avoid full re-render), @defer (lazy-load heavy components), lazy routes, virtual scrolling, preloading, bundle analysis.</p>", "code": "// 1. OnPush + Signals\n@Component({ changeDetection: ChangeDetectionStrategy.OnPush })\ncount = signal(0);\n\n// 2. @for with track (mandatory, avoids full re-render)\n@for (item of items; track item.id) { <card [data]=\"item\"/> }\n\n// 3. @defer — lazy-load heavy components\n@defer (on viewport) { <heavy-chart/> }\n\n// 4. Virtual scrolling for large lists\n// <cdk-virtual-scroll-viewport itemSize=\"60\">...</cdk-virtual-scroll-viewport>\n\n// 5. Lazy routes + preloading\n{ path: 'admin', loadChildren: () => import('./admin.routes') }\nprovideRouter(routes, withPreloading(PreloadAllModules))\n\n// 6. Bundle analysis\n// ng build --stats-json && npx webpack-bundle-analyzer dist/stats.json"}, {"id": 77, "q": "What is NgRx Entity and why use it?", "cat": "NgRx", "tags": ["ta"], "a": "<p>NgRx Entity simplifies managing collections of records in the store using a normalized state shape (ids array + entities dictionary). Provides adapter methods for CRUD operations without writing boilerplate reducer logic.</p>", "code": "import { createEntityAdapter, EntityState } from '@ngrx/entity';\n\ninterface UserState extends EntityState<User> {}\nconst adapter = createEntityAdapter<User>();\nconst initialState = adapter.getInitialState();\n\nconst reducer = createReducer(initialState,\n  on(loadUsersSuccess, (state, { users }) =>\n    adapter.setAll(users, state)\n  ),\n  on(addUser, (state, { user }) =>\n    adapter.addOne(user, state)\n  ),\n  on(updateUser, (state, { update }) =>\n    adapter.updateOne(update, state)\n  ),\n  on(deleteUser, (state, { id }) =>\n    adapter.removeOne(id, state)\n  )\n);\n\n// Selectors auto-generated\nconst { selectAll, selectEntities, selectIds } = adapter.getSelectors();"}, {"id": 78, "q": "What is the Facade pattern in NgRx?", "cat": "NgRx", "tags": ["ta"], "a": "<p>A Facade is a service that wraps Store interactions (dispatch + select), giving components a simple API instead of importing NgRx directly. Decouples components from store implementation details and improves testability.</p>", "code": "@Injectable({ providedIn: 'root' })\nexport class UserFacade {\n  private store = inject(Store);\n\n  users$ = this.store.select(selectUsers);\n  loading$ = this.store.select(selectUsersLoading);\n\n  loadUsers() {\n    this.store.dispatch(loadUsers());\n  }\n  deleteUser(id: number) {\n    this.store.dispatch(deleteUser({ id }));\n  }\n}\n\n// Component — no NgRx imports needed!\nexport class UserListComponent {\n  private facade = inject(UserFacade);\n  users$ = this.facade.users$;\n  ngOnInit() { this.facade.loadUsers(); }\n}"}, {"id": 79, "q": "What is ControlValueAccessor in Angular?", "cat": "Forms", "tags": ["ta", "tf"], "a": "<p>ControlValueAccessor is an interface that lets a custom component integrate with Angular Forms (ngModel / formControlName) as if it were a native input. Required for building custom form controls like star ratings or toggle switches.</p>", "code": "@Component({\n  selector: 'app-rating',\n  template: `<span *ngFor=\"let s of stars\" (click)=\"select(s)\">{{ s <= value ? '★' : '☆' }}</span>`,\n  providers: [{\n    provide: NG_VALUE_ACCESSOR,\n    useExisting: forwardRef(() => RatingComponent),\n    multi: true\n  }]\n})\nexport class RatingComponent implements ControlValueAccessor {\n  stars = [1,2,3,4,5];\n  value = 0;\n  onChange = (v: number) => {};\n  onTouched = () => {};\n\n  writeValue(v: number) { this.value = v; }\n  registerOnChange(fn: any) { this.onChange = fn; }\n  registerOnTouched(fn: any) { this.onTouched = fn; }\n\n  select(s: number) { this.value = s; this.onChange(s); }\n}\n// <app-rating formControlName=\"rating\"></app-rating>"}, {"id": 80, "q": "What is Renderer2 in Angular and why use it?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Renderer2 is an abstraction for manipulating the DOM safely across platforms (browser, server, web workers). Avoids direct DOM access (ElementRef.nativeElement), which is unsafe for SSR and breaks platform independence.</p>", "code": "@Directive({ selector: '[appSafeStyle]' })\nexport class SafeStyleDirective {\n  private renderer = inject(Renderer2);\n  private el = inject(ElementRef);\n\n  @HostListener('mouseenter')\n  onEnter() {\n    this.renderer.setStyle(this.el.nativeElement, 'color', 'red');\n    this.renderer.addClass(this.el.nativeElement, 'highlighted');\n  }\n  @HostListener('mouseleave')\n  onLeave() {\n    this.renderer.removeStyle(this.el.nativeElement, 'color');\n    this.renderer.removeClass(this.el.nativeElement, 'highlighted');\n  }\n}\n// Renderer2 works correctly with SSR; nativeElement manipulation does not"}, {"id": 81, "q": "What are Multi Providers in Angular DI?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Multi providers (multi: true) let multiple values be registered against the same DI token, returned as an array when injected. Used for interceptors, validators, and extensible plugin-style architectures.</p>", "code": "export const VALIDATION_RULES = new InjectionToken<ValidationRule[]>('rules');\n\nproviders: [\n  { provide: VALIDATION_RULES, useValue: requiredRule, multi: true },\n  { provide: VALIDATION_RULES, useValue: emailRule, multi: true },\n  { provide: VALIDATION_RULES, useValue: minLengthRule, multi: true }\n]\n\n@Injectable()\nexport class FormValidatorService {\n  // Injects ALL registered rules as an array\n  private rules = inject(VALIDATION_RULES);\n\n  validate(value: any) {\n    return this.rules.map(rule => rule(value)).filter(Boolean);\n  }\n}\n// HTTP_INTERCEPTORS is a built-in example of a multi-provider token"}, {"id": 82, "q": "What are Host Directives in Angular (v15+)?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>hostDirectives let a component or directive compose behavior from other directives without inheritance, applying them directly to the host element. Enables clean behavior composition (like mixins) in a type-safe way.</p>", "code": "@Directive({ selector: '[appTooltip]', standalone: true })\nexport class TooltipDirective {\n  @Input() tooltipText = '';\n}\n\n@Directive({ selector: '[appDraggable]', standalone: true })\nexport class DraggableDirective {\n  @Input() dragHandle = '';\n}\n\n@Component({\n  selector: 'app-card',\n  standalone: true,\n  hostDirectives: [\n    { directive: TooltipDirective, inputs: ['tooltipText'] },\n    DraggableDirective\n  ]\n})\nexport class CardComponent {}\n\n// <app-card tooltipText=\"Drag me\"></app-card>\n// Card now has tooltip AND drag behavior, no inheritance needed"}, {"id": 83, "q": "How do you test Angular components with TestBed?", "cat": "Testing", "tags": ["ta"], "a": "<p>TestBed configures and creates an Angular testing module, allowing components to be instantiated with mocked dependencies. ComponentFixture provides access to the component instance and its rendered DOM for assertions.</p>", "code": "describe('UserCardComponent', () => {\n  let fixture: ComponentFixture<UserCardComponent>;\n  let component: UserCardComponent;\n\n  beforeEach(async () => {\n    await TestBed.configureTestingModule({\n      imports: [UserCardComponent], // standalone\n      providers: [\n        { provide: UserService, useValue: { getUser: () => of(mockUser) } }\n      ]\n    }).compileComponents();\n\n    fixture = TestBed.createComponent(UserCardComponent);\n    component = fixture.componentInstance;\n    component.user = mockUser;\n    fixture.detectChanges();\n  });\n\n  it('should display user name', () => {\n    const el: HTMLElement = fixture.nativeElement;\n    expect(el.querySelector('h2')?.textContent).toContain(mockUser.name);\n  });\n});"}, {"id": 84, "q": "How do you mock HTTP requests in Angular tests?", "cat": "Testing", "tags": ["ta"], "a": "<p>HttpClientTestingModule and HttpTestingController intercept outgoing HTTP requests in tests, letting you assert on the request and flush a mock response without hitting a real server.</p>", "code": "describe('UserService', () => {\n  let service: UserService;\n  let httpMock: HttpTestingController;\n\n  beforeEach(() => {\n    TestBed.configureTestingModule({\n      imports: [HttpClientTestingModule],\n      providers: [UserService]\n    });\n    service = TestBed.inject(UserService);\n    httpMock = TestBed.inject(HttpTestingController);\n  });\n\n  it('should fetch users', () => {\n    const mockUsers = [{ id: 1, name: 'Ali' }];\n\n    service.getAll().subscribe(users => {\n      expect(users).toEqual(mockUsers);\n    });\n\n    const req = httpMock.expectOne('/api/users');\n    expect(req.request.method).toBe('GET');\n    req.flush(mockUsers);\n  });\n\n  afterEach(() => httpMock.verify());\n});"}, {"id": 85, "q": "How do you test Angular Signals?", "cat": "Testing", "tags": ["ta"], "a": "<p>Signals are tested by calling them directly as functions and asserting the returned value — no async handling or fixture.detectChanges() is needed since signals update synchronously.</p>", "code": "describe('CounterComponent', () => {\n  let component: CounterComponent;\n\n  beforeEach(() => {\n    TestBed.configureTestingModule({ imports: [CounterComponent] });\n    component = TestBed.createComponent(CounterComponent).componentInstance;\n  });\n\n  it('should increment count', () => {\n    expect(component.count()).toBe(0);\n    component.increment();\n    expect(component.count()).toBe(1);\n  });\n\n  it('should compute doubled value reactively', () => {\n    component.count.set(5);\n    expect(component.doubled()).toBe(10);\n  });\n});"}, {"id": 86, "q": "What is Angular Animations API?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Angular's animation module (@angular/animations) declaratively defines state-based transitions using triggers, states, and transitions, compiled to performant Web Animations API calls.</p>", "code": "import { trigger, state, style, transition, animate } from '@angular/animations';\n\n@Component({\n  selector: 'app-toggle',\n  animations: [\n    trigger('openClose', [\n      state('open', style({ height: '200px', opacity: 1 })),\n      state('closed', style({ height: '0px', opacity: 0 })),\n      transition('open <=> closed', animate('300ms ease-in-out'))\n    ])\n  ],\n  template: `<div [@openClose]=\"isOpen ? 'open' : 'closed'\">Content</div>`\n})\nexport class ToggleComponent {\n  isOpen = false;\n}\n// provideAnimationsAsync() in app.config.ts (Angular 17+, lazy loads animation engine)"}, {"id": 87, "q": "What is i18n (Internationalization) in Angular?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Angular's built-in i18n uses the i18n attribute to mark translatable text in templates. The CLI extracts these into XLIFF/XMB files for translation, then builds locale-specific bundles at compile time.</p>", "code": "<!-- Mark text for translation -->\n<h1 i18n=\"@@welcomeMessage\">Welcome to our app</h1>\n<p i18n>You have {{ count }} new messages</p>\n\n# Extract translatable strings\nng extract-i18n --output-path src/locale\n\n# messages.fr.xlf — translator fills in <target>\n\n// angular.json — configure locales\n\"i18n\": {\n  \"sourceLocale\": \"en\",\n  \"locales\": { \"fr\": \"src/locale/messages.fr.xlf\" }\n}\n\n# Build for a specific locale\nng build --localize"}, {"id": 88, "q": "What is Module Federation / Micro-frontends in Angular?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Module Federation (via @angular-architects/module-federation) lets multiple independently-deployed Angular apps share code and load each other's components at runtime, enabling micro-frontend architectures.</p>", "code": "// webpack.config.js — host app\nmodule.exports = withModuleFederationPlugin({\n  remotes: {\n    mfe1: 'mfe1@http://localhost:4201/remoteEntry.js'\n  },\n  shared: ['@angular/core', '@angular/common', '@angular/router']\n});\n\n// Lazy load remote module in routes\n{\n  path: 'remote-feature',\n  loadChildren: () =>\n    loadRemoteModule({\n      remoteEntry: 'http://localhost:4201/remoteEntry.js',\n      remoteName: 'mfe1',\n      exposedModule: './Module'\n    }).then(m => m.RemoteModule)\n}\n// webpack.config.js — remote app exposes its module\nexposes: { './Module': './src/app/remote/remote.module.ts' }"}, {"id": 89, "q": "What is Angular Elements?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Angular Elements packages Angular components as native Custom Elements (Web Components), allowing them to be used in any framework or plain HTML — outside the Angular ecosystem entirely.</p>", "code": "import { createCustomElement } from '@angular/elements';\n\n@Component({\n  selector: 'app-widget',\n  standalone: true,\n  template: `<p>{{ message }}</p>`\n})\nexport class WidgetComponent {\n  @Input() message = '';\n}\n\n// main.ts — register as a custom element\nconst injector = createApplicationInjector();\nconst WidgetElement = createCustomElement(WidgetComponent, { injector });\ncustomElements.define('app-widget', WidgetElement);\n\n// Now usable in ANY HTML page, React, Vue, etc:\n// <app-widget message=\"Hello\"></app-widget>"}, {"id": 90, "q": "What is a Structural Directive and how do you create a custom one?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Structural directives change the DOM layout by adding/removing elements, using the * prefix shorthand (desugars to ng-template). Custom ones use TemplateRef and ViewContainerRef to control rendering.</p>", "code": "@Directive({ selector: '[appUnless]', standalone: true })\nexport class UnlessDirective {\n  private hasView = false;\n  private templateRef = inject(TemplateRef<any>);\n  private viewContainer = inject(ViewContainerRef);\n\n  @Input() set appUnless(condition: boolean) {\n    if (!condition && !this.hasView) {\n      this.viewContainer.createEmbeddedView(this.templateRef);\n      this.hasView = true;\n    } else if (condition && this.hasView) {\n      this.viewContainer.clear();\n      this.hasView = false;\n    }\n  }\n}\n// <p *appUnless=\"isLoggedIn\">Please log in</p>"}, {"id": 91, "q": "What is Angular DevTools and how do you use it?", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>Angular DevTools is a Chrome/Firefox extension that visualizes the component tree, inspects component state and props, profiles change detection cycles, and helps identify performance bottlenecks.</p>", "code": "// No code needed — install the browser extension, then:\n\n// 1. Component tree tab — inspect hierarchy and properties\n//    Click any component to see its @Input/@Output values and signals\n\n// 2. Profiler tab — record a session and see:\n//    - Which components ran change detection\n//    - How long each CD cycle took\n//    - Which OnPush components were skipped vs checked\n\n// 3. Use it to spot:\n//    - Components re-rendering unnecessarily (missing OnPush)\n//    - Expensive computed() chains\n//    - Zone.js triggering excess change detection rounds"}, {"id": 92, "q": "What is TransferState in Angular SSR?", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>TransferState passes data fetched on the server during SSR to the client, avoiding a duplicate HTTP request when the app hydrates in the browser. Prevents the 'double fetch' problem in Universal apps.</p>", "code": "// Server-side: store fetched data\nimport { TransferState, makeStateKey } from '@angular/core';\n\nconst USER_KEY = makeStateKey<User>('user');\n\n@Injectable({ providedIn: 'root' })\nexport class UserService {\n  private transferState = inject(TransferState);\n  private http = inject(HttpClient);\n  private isServer = isPlatformServer(inject(PLATFORM_ID));\n\n  getUser(id: number) {\n    if (this.transferState.hasKey(USER_KEY)) {\n      const user = this.transferState.get(USER_KEY, null);\n      this.transferState.remove(USER_KEY); // use once\n      return of(user);\n    }\n    return this.http.get<User>(`/api/users/${id}`).pipe(\n      tap(user => { if (this.isServer) this.transferState.set(USER_KEY, user); })\n    );\n  }\n}"}, {"id": 93, "q": "What is the difference between providedIn root, platform, and any?", "cat": "Angular Core", "tags": ["ta"], "a": "<p><b>root</b>: single app-wide singleton (most common). <b>platform</b>: shared across multiple Angular apps on the same page. <b>any</b>: one instance per lazy-loaded module, but shared in the eager bundle.</p>", "code": "// root — one instance for entire application (default choice)\n@Injectable({ providedIn: 'root' })\nexport class UserService {}\n\n// platform — shared across multiple apps on the same page\n@Injectable({ providedIn: 'platform' })\nexport class SharedCacheService {}\n\n// any — new instance per lazy-loaded module\n@Injectable({ providedIn: 'any' })\nexport class FeatureScopedService {}\n// Eagerly loaded code still shares ONE instance with 'any'\n// Only separately lazy-loaded modules get their own instance"}, {"id": 94, "q": "What is Angular's Content Security Policy (CSP) support?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Angular supports strict CSP via the ngCspNonce attribute, allowing inline styles Angular generates to pass nonce-based CSP without using unsafe-inline. Critical for security-hardened production deployments.</p>", "code": "<!-- index.html — set nonce on root element -->\n<html ngCspNonce=\"{{ cspNonce }}\">\n\n<!-- Server generates a random nonce per request and sets matching CSP header -->\n<!-- Content-Security-Policy: style-src 'nonce-{cspNonce}' -->\n\n// Angular automatically applies the nonce to its\n// dynamically inserted <style> tags, satisfying strict CSP\n// without requiring 'unsafe-inline' in your policy"}, {"id": 95, "q": "What is DomSanitizer and when do you need it?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>DomSanitizer sanitizes values before Angular inserts them into the DOM (HTML, styles, URLs) to prevent XSS attacks. Bypass methods exist but should only be used for content you fully trust.</p>", "code": "@Component({ selector: 'app-content', template: `<div [innerHTML]=\"safeHtml\"></div>` })\nexport class ContentComponent {\n  private sanitizer = inject(DomSanitizer);\n  rawHtml = '<p>Hello <img src=x onerror=alert(1)></p>';\n\n  // Angular auto-sanitizes [innerHTML] by default — script tags stripped\n  safeHtml = this.rawHtml;\n\n  // Only bypass for FULLY TRUSTED content (e.g. from your own CMS)\n  trustedHtml = this.sanitizer.bypassSecurityTrustHtml(this.rawHtml);\n  trustedUrl  = this.sanitizer.
