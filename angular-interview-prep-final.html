bypassSecurityTrustUrl(externalUrl);\n}\n// Never bypass sanitization for user-generated content!"}, {"id": 96, "q": "How does NgRx ComponentStore differ from the global Store?", "cat": "NgRx", "tags": ["ta"], "a": "<p>ComponentStore manages local, component-scoped state with the same reactive patterns as NgRx Store (selectors, effects, updaters) but without global actions/reducers boilerplate — ideal for state that doesn't need app-wide sharing.</p>", "code": "@Injectable()\nexport class UsersStore extends ComponentStore<{ users: User[]; loading: boolean }> {\n  constructor(private api: UserService) {\n    super({ users: [], loading: false });\n  }\n\n  readonly users$ = this.select(state => state.users);\n  readonly loading$ = this.select(state => state.loading);\n\n  readonly loadUsers = this.effect((trigger$) =>\n    trigger$.pipe(\n      tap(() => this.patchState({ loading: true })),\n      switchMap(() => this.api.getAll()),\n      tap(users => this.patchState({ users, loading: false }))\n    )\n  );\n}\n// Provide at component level — auto-disposed on component destroy"}, {"id": 97, "q": "What is the difference between Angular Signals and NgRx for state management?", "cat": "Signals", "tags": ["ta"], "a": "<p>Signals are a built-in primitive for local/component reactive state with minimal boilerplate. NgRx provides a structured, traceable, time-travel-debuggable architecture for complex, app-wide shared state with strict unidirectional data flow.</p>", "code": "// Signals — simple, local, less ceremony\n@Component({...})\nexport class CartComponent {\n  items = signal<CartItem[]>([]);\n  total = computed(() => this.items().reduce((s,i) => s+i.price, 0));\n  addItem(item: CartItem) { this.items.update(l => [...l, item]); }\n}\n\n// NgRx — structured, traceable, app-wide\n// Action -> Reducer -> Store -> Selector\n// Best when: multiple features need the same state,\n// you need devtools time-travel debugging,\n// or strict separation of concerns is required.\n\n// Many teams now use Signals for local UI state\n// and NgRx only for genuinely shared, cross-feature state."}, {"id": 98, "q": "What is the purpose of NgZone and zone.run()?", "cat": "Performance", "tags": ["ta", "tp"], "a": "<p>NgZone wraps async operations so Angular knows when to run change detection. runOutsideAngular() skips CD for performance-heavy operations (animations, intervals); run() re-enters the zone to trigger CD when needed.</p>", "code": "@Component({...})\nexport class ChartComponent {\n  private zone = inject(NgZone);\n\n  startAnimation() {\n    // Run outside Angular — no CD triggered per frame (huge perf win)\n    this.zone.runOutsideAngular(() => {\n      const animate = () => {\n        this.updateCanvas(); // heavy, frequent updates\n        requestAnimationFrame(animate);\n      };\n      animate();\n    });\n  }\n\n  onAnimationComplete(result: string) {\n    // Re-enter Angular zone to update bound UI\n    this.zone.run(() => {\n      this.resultMessage = result; // triggers CD correctly\n    });\n  }\n}"}, {"id": 99, "q": "What is the purpose of the @Optional, @Self, and @SkipSelf decorators in DI?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>These decorators fine-tune dependency resolution: @Optional allows null instead of throwing if not found, @Self restricts lookup to the current injector only, @SkipSelf skips the current injector and starts from the parent.</p>", "code": "@Component({...})\nexport class ChildComponent {\n  // @Optional — won't throw if LoggerService isn't provided\n  constructor(@Optional() private logger?: LoggerService) {\n    this.logger?.log('Child created');\n  }\n}\n\n@Directive({ selector: '[appChild]' })\nexport class ChildDirective {\n  // @Self — only look in this element's own providers, not ancestors\n  constructor(@Self() private parent: ParentDirective) {}\n}\n\n@Component({...})\nexport class WidgetComponent {\n  // @SkipSelf — skip own providers, look starting from parent injector\n  constructor(@SkipSelf() private config: ConfigService) {}\n}"}, {"id": 100, "q": "What is the difference between Renderer2 createElement and direct ng-template rendering?", "cat": "Angular Core", "tags": ["ta"], "a": "<p>Renderer2.createElement() imperatively creates raw DOM nodes outside Angular's change detection awareness — Angular won't track bindings inside them. ng-template + ViewContainerRef creates Angular-aware views with full binding, directive, and CD support.</p>", "code": "// Renderer2 — raw DOM, no Angular bindings/CD inside\nconst el = this.renderer.createElement('div');\nthis.renderer.setProperty(el, 'textContent', 'Static content');\nthis.renderer.appendChild(this.host.nativeElement, el);\n// No data binding, directives, or change detection here\n\n// ViewContainerRef + TemplateRef — full Angular view\n@ViewChild('tpl') tpl!: TemplateRef<any>;\n@ViewChild('container', { read: ViewContainerRef }) vcr!: ViewContainerRef;\n\ncreateView() {\n  const viewRef = this.vcr.createEmbeddedView(this.tpl, { user: this.currentUser });\n  // Full bindings, directives, and change detection work here\n}"}]
</script>
<script>
const Q = JSON.parse(document.getElementById('qdata').textContent);
const CATS = ['All', ...new Set(Q.map(q => q.cat))];
const TAG_LABELS = {ta:'angular',tt:'ts',tj:'js',tr:'rxjs',tc:'css',tf:'forms',to:'router',tp:'perf',tm:'misc'};
let bm = [];
try { bm = JSON.parse(localStorage.getItem('angBM') || '[]'); } catch(e) {}
let showBM = false, activeCat = 'All';

function init() {
  const cf = document.getElementById('cf');
  CATS.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'cb' + (cat === 'All' ? ' on' : '');
    b.textContent = cat === 'Angular Core' ? 'Core' : cat === 'Performance' ? 'Perf' : cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll('.cb').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      fc();
    };
    cf.appendChild(b);
  });
  rc(Q);
  ub();
  window.addEventListener('scroll', () => {
    document.getElementById('btt').classList.toggle('show', window.scrollY > 400);
  });
}

function rc(list) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emp');
  grid.innerHTML = '';
  if (!list.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.forEach(q => {
    const isBM = bm.includes(q.id);
    const tagHTML = q.tags.map(t => `<span class="tg t${t}">${TAG_LABELS[t]||t}</span>`).join('');
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'c' + q.id;
    const head = document.createElement('div');
    head.className = 'ch';
    head.onclick = () => tg(q.id);
    head.innerHTML = `<span class="qn">${String(q.id).padStart(2,'0')}</span>`;
    const qt = document.createElement('span');
    qt.className = 'qt';
    qt.textContent = q.q;
    const bmBtn = document.createElement('button');
    bmBtn.className = 'bm' + (isBM ? ' on' : '');
    bmBtn.innerHTML = isBM ? '&#11088;' : '&#9734;';
    bmBtn.title = 'Bookmark';
    bmBtn.onclick = e => { e.stopPropagation(); bmk(q.id); };
    head.appendChild(qt);
    head.appendChild(bmBtn);
    const ct = document.createElement('div');
    ct.className = 'ct';
    ct.innerHTML = tagHTML + `<span class="tg tm">${q.cat}</span>`;
    const ans = document.createElement('div');
    ans.className = 'ans';
    ans.innerHTML = q.a;
    if (q.code) {
      const h4 = document.createElement('h4');
      h4.textContent = 'Code Example';
      const pre = document.createElement('pre');
      const cpb = document.createElement('button');
      cpb.className = 'cpb';
      cpb.textContent = 'Copy';
      cpb.onclick = () => cp(cpb, q.code);
      const code = document.createElement('code');
      code.textContent = q.code;
      pre.appendChild(cpb);
      pre.appendChild(code);
      ans.appendChild(h4);
      ans.appendChild(pre);
    }
    card.appendChild(head);
    card.appendChild(ct);
    card.appendChild(ans);
    grid.appendChild(card);
  });
  document.getElementById('cd').textContent = list.length;
}

function tg(id) { document.getElementById('c'+id).classList.toggle('open'); }
function ea() { document.querySelectorAll('.card').forEach(c => c.classList.add('open')); }
function ca() { document.querySelectorAll('.card').forEach(c => c.classList.remove('open')); }

function bmk(id) {
  const i = bm.indexOf(id);
  if (i === -1) bm.push(id); else bm.splice(i,1);
  try { localStorage.setItem('angBM', JSON.stringify(bm)); } catch(e) {}
  ub(); fc();
}
function ub() { document.getElementById('bc').textContent = bm.length; }
function tb2() {
  showBM = !showBM;
  const btn = document.getElementById('bmt');
  btn.textContent = showBM ? '⭐ Show All' : '⭐ Bookmarks Only';
  btn.classList.toggle('bmon', showBM);
  fc();
}
function fc() {
  const s = document.getElementById('sin').value.toLowerCase();
  let res = Q;
  if (activeCat !== 'All') res = res.filter(q => q.cat === activeCat);
  if (s) res = res.filter(q =>
    q.q.toLowerCase().includes(s) ||
    q.a.toLowerCase().includes(s) ||
    q.cat.toLowerCase().includes(s) ||
    (q.code && q.code.toLowerCase().includes(s))
  );
  if (showBM) res = res.filter(q => bm.includes(q.id));
  rc(res);
}
function cp(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}
init();
</script>
</body>
</html>
